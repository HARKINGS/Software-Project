spring:
    datasource:
        url: jdbc:mysql://localhost:3306/mysql_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: root
        password: 
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
            show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                
    main.allow-circular-references: true

